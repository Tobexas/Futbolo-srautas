<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Futbolo srautas</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .team {
      margin-bottom: 40px;
    }

    .team h2 {
      background: #222;
      color: white;
      padding: 10px;
    }

    .player {
  display: grid;
  grid-template-columns: 60px 1fr 120px 80px;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
  align-items: center;
    }

    .green { color: green; font-weight: bold; }
    .red { color: red; font-weight: bold; }
  </style>
</head>
<body>

<h1>Komandų sudėtys</h1>

<div id="content"></div>

<script>
const sheetID = "1-3MEUf3YVkoEEST6N4KtFCCdaDxCYt4yevytt-rKRW4";
const url = `https://opensheet.elk.sh/${sheetID}/test`;

fetch(url)
  .then(res => res.json())
  .then(data => {

    let content = document.getElementById("content");

    // grupuojam pagal komandą
    let teams = {};

    data.forEach(row => {
      let team = row["Komanda"];

      if (!teams[team]) {
        teams[team] = [];
      }

      teams[team].push(row);
    });

    // renderinam
    for (let team in teams) {
      let teamDiv = document.createElement("div");
      teamDiv.className = "team";

      let title = document.createElement("h2");
      title.innerText = team;

      teamDiv.appendChild(title);

      teams[team].forEach(player => {
        let div = document.createElement("div");
        div.className = "player";

        let statusClass = "";
        if (player["Statusas"] === "Atėjo") statusClass = "yellow";
        if (player["Statusas"] === "Pratęsta") statusClass = "green";
        if (player["Statusas"] === "Išnuomotas") statusClass = "red";

        div.innerHTML = `
          <b>${player["Pozicija"]}</b> 
          ${player["Žaidėjas"]} 
          <span class="${statusClass}">${player["Statusas"]}</span>
          (${player["Iki"] || ""})
        `;

        teamDiv.appendChild(div);
      });

      content.appendChild(teamDiv);
    }

  });
</script>

</body>
</html>
