<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Futbolo srautas</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }
    .trn {
       background-color: #fff9c4;
    }
    .Išnuomotas {
       background-color: #c0c0c0;
    }
    .container {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0;
    }

    h1 {
      text-align: center;
    }

    .team {
      margin-bottom: 40px;
    }

    .team h2 {
      background: #222;
      color: white;
      padding: 10px;
    }

    .player {
      display: grid;
      grid-template-columns: 60px 1fr 120px 80px;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      align-items: center;
    }

    /* mobile fix */
    @media (max-width: 600px) {
      .player {
        grid-template-columns: 40px 1fr;
        gap: 5px;
      }
    }

    .green { color: green; font-weight: bold; }
    .red { color: red; font-weight: bold; }
    .yellow { color: orange; font-weight: bold; }

  </style>
</head>
<body>

<div class="container">
  <h1>Komandų sudėtys</h1>
  <div id="content"></div>
</div>

<script>
const sheetID = "1-3MEUf3YVkoEEST6N4KtFCCdaDxCYt4yevytt-rKRW4";
const url = `https://opensheet.elk.sh/${sheetID}/test`;

fetch(url)
  .then(res => res.json())
  .then(data => {

    let content = document.getElementById("content");

    let teams = {};

    data.forEach(row => {
      let team = row["Komanda"];

      if (!teams[team]) {
        teams[team] = [];
      }

      teams[team].push(row);
    });

    for (let team in teams) {
      let teamDiv = document.createElement("div");
      teamDiv.className = "team";

      let title = document.createElement("h2");
      title.innerText = team;

      teamDiv.appendChild(title);

      teams[team].forEach(player => {
        let div = document.createElement("div");
div.className = "player";

if (player["Pozicija"] === "Trn") {
  div.classList.add("trn");

if (player["Statusas"] === "Išnuomotas") {
div.classList.add("Išnuomotas");
}

        let statusClass = "";
        if (player["Statusas"] === "Atėjo") statusClass = "yellow";
        if (player["Statusas"] === "Pratęsta") statusClass = "green";
        if (player["Statusas"] === "Išnuomotas") statusClass = "red";

        div.innerHTML = `
          <div><b>${player["Pozicija"]}</b></div>
          <div>${player["Žaidėjas"]}</div>
          <div class="${statusClass}">${player["Statusas"]}</div>
          <div>${player["Iki"] || ""}</div>
        `;

        teamDiv.appendChild(div);
      });

      content.appendChild(teamDiv);
    }

  });
</script>

</body>
</html>
