<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Futbolo srautas</title>
</head>
<body>

<h1>Transferai</h1>

<table border="1" id="table"></table>

<script>
const sheetID = "2PACX-1vR1HYn4gCU0pKt04vYNKBYoVIrUd_34i-ku2WK_W4K8uQDV3lgZKEMuy-4IrilQT4fX5InpFK37-uiY";
const url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vR1HYn4gCU0pKt04vYNKBYoVIrUd_34i-ku2WK_W4K8uQDV3lgZKEMuy-4IrilQT4fX5InpFK37-uiY/pubhtml`;

fetch(url)
  .then(res => res.json())
  .then(data => {
    let table = document.getElementById("table");

    // header
    let headers = Object.keys(data[0]);
    let headerRow = "<tr>";
    headers.forEach(h => headerRow += `<th>${h}</th>`);
    headerRow += "</tr>";
    table.innerHTML += headerRow;

    // rows
    data.forEach(row => {
      let rowHTML = "<tr>";
      headers.forEach(h => rowHTML += `<td>${row[h]}</td>`);
      rowHTML += "</tr>";
      table.innerHTML += rowHTML;
    });
  });
</script>

</body>
</html>
