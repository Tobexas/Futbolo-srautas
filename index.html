<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Futbolo srautas</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .logo {
      max-width: 270px;
      height: auto;
    }

    .instagram img {
      width: 50px;
      height: 50px;
    }

    .instagram img:hover {
      opacity: 0.7;
    }

    h1 {
      text-align: center;
    }

    .team {
      margin-bottom: 40px;
    }

    .team h2 {
      background: #222;
      color: white;
      padding: 10px;
    }

    .player {
      display: grid;
      grid-template-columns: 60px 1fr 120px 80px;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      align-items: center;
    }

    @media (max-width: 600px) {
      .player {
        grid-template-columns: 40px 1fr;
        gap: 5px;
      }
    }

    .trn {
      background-color: #fff9c4;
      border-top: 2px solid #999;
      border-bottom: 2px solid #999;
      margin: 8px 0;
      padding: 8px 0;
    }

    .loan { background-color: #f2f2f2; }
    .left { background-color: #ffe5e5; }
    .extended { background-color: #fff9c4; }
    .signed { background-color: #e6ffe6; }

    .player:hover {
      filter: brightness(0.98);
    }

    .header-row {
      display: grid;
      grid-template-columns: 60px 1fr 120px 80px;
      gap: 10px;
      font-weight: bold;
      border-bottom: 2px solid #000;
      padding: 6px 0;
      margin-bottom: 5px;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- NAUJAS HEADER -->
  <div class="header">
    <img src="https://iili.io/BOA1EmB.jpg" class="logo">

    <a href="https://instagram.com/futbolo_srautas" target="_blank" class="instagram">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
    </a>
  </div>

  <h1>TopLygos komandų turgus</h1>
  <div id="content"></div>

</div>

<script>
const sheetID = "1-3MEUf3YVkoEEST6N4KtFCCdaDxCYt4yevytt-rKRW4";
const url = `https://opensheet.elk.sh/${sheetID}/test`;

fetch(url)
  .then(res => res.json())
  .then(data => {

    let content = document.getElementById("content");
    let teams = {};

    data.forEach(row => {
      let team = row["Komanda"];

      if (!teams[team]) {
        teams[team] = [];
      }

      teams[team].push(row);
    });

    for (let team in teams) {
      let teamDiv = document.createElement("div");
      teamDiv.className = "team";

      let title = document.createElement("h2");
      title.innerText = team;

      teamDiv.appendChild(title);

      let header = document.createElement("div");
      header.className = "header-row";

      header.innerHTML = `
        <div>Poz</div>
        <div>Žaidėjas</div>
        <div>Statusas</div>
        <div>Iki</div>
      `;

      teamDiv.appendChild(header);

      teams[team].sort((a, b) => {

        let posA = (a["Pozicija"] || "").trim();
        let posB = (b["Pozicija"] || "").trim();

        let statusA = (a["Statusas"] || "").trim();
        let statusB = (b["Statusas"] || "").trim();

        const statusOrder = {
          "Paliko": 100,
          "Išnuomotas": 90
        };

        let statusDiff = (statusOrder[statusA] || 0) - (statusOrder[statusB] || 0);
        if (statusDiff !== 0) return statusDiff;

        function getPosOrder(pos) {
          if (pos === "GK") return 1;
          if (pos.startsWith("D")) return 2;
          if (pos.startsWith("M")) return 3;
          if (pos.startsWith("A")) return 4;
          if (pos === "ST") return 5;
          if (pos === "Trn") return 6;
          return 99;
        }

        return getPosOrder(posA) - getPosOrder(posB);
      });

      teams[team].forEach(player => {
        let div = document.createElement("div");
        div.className = "player";

        if (player["Pozicija"]?.trim() === "Trn") {
          div.classList.add("trn");
        }

        let status = player["Statusas"]?.trim();

        if (status === "Išnuomotas") div.classList.add("loan");
        if (status === "Paliko") div.classList.add("left");
        if (status === "Pratęsta") div.classList.add("extended");
        if (status === "Pasirašė") div.classList.add("signed");

        div.innerHTML = `
          <div><b>${player["Pozicija"] || ""}</b></div>
          <div>${player["Žaidėjas"] || ""}</div>
          <div>${player["Statusas"] || ""}</div>
          <div>${player["Iki"] || ""}</div>
        `;

        teamDiv.appendChild(div);
      });

      content.appendChild(teamDiv);
    }

  });
</script>

</body>
</html>
